name: Update fuel prices

on:
  schedule:
    - cron: "0 * * * *"   # every hour on the hour
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices from OK API
        run: python fetch_prices.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No price changes — nothing to commit."
          else
            git commit -m "chore: update fuel prices $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
